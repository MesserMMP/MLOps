syntax = "proto3";

package mlservice;

service MLService {
  rpc ListModelClasses (ListModelClassesRequest) returns (ListModelClassesResponse);
  rpc TrainModel (TrainModelRequest) returns (TrainModelResponse);
  rpc Predict (PredictRequest) returns (PredictResponse);
}

message ListModelClassesRequest {}

message ModelClassInfo {
  string name = 1;
  string default_params_json = 2;
}

message ListModelClassesResponse {
  repeated ModelClassInfo classes = 1;
}

message TrainModelRequest {
  string dataset_name = 1;
  string model_class = 2;
  string hyperparams_json = 3; // JSON-строка с гиперпараметрами
}

message TrainModelResponse {
  string model_id = 1;
  string model_class = 2;
}

message PredictRequest {
  string model_id = 1;
  repeated double data = 2; // плоский массив
  int32 n_features = 3;     // сколько фич на объект
}

message PredictResponse {
  repeated double predictions = 1;
}
