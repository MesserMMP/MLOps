# Create this secret before deploying:
#
#   kubectl create secret generic mlops-secrets \
#     --from-literal=minio-access-key=minioadmin \
#     --from-literal=minio-secret-key=minioadmin \
#     --from-literal=clearml-access-key=<YOUR_ACCESS_KEY> \
#     --from-literal=clearml-secret-key=<YOUR_SECRET_KEY>
#
# The file below is a template only – do NOT commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: mlops-secrets
type: Opaque
stringData:
  minio-access-key: minioadmin
  minio-secret-key: minioadmin
  clearml-access-key: "REPLACE_ME"
  clearml-secret-key: "REPLACE_ME"
