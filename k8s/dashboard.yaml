apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-dashboard
  labels:
    app: mlops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-dashboard
  template:
    metadata:
      labels:
        app: mlops-dashboard
    spec:
      containers:
        - name: dashboard
          image: mlops-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          env:
            - name: BACKEND_URL
              value: "http://mlops-backend:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: mlops-dashboard
spec:
  selector:
    app: mlops-dashboard
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
  type: NodePort
